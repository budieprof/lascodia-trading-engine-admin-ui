server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers aligned with PRD §14.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https: wss:;" always;

    # Long-cache hashed bundles; never cache index/config.
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location = /config.json {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # SPA fallback: all client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip text responses.
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Favour brotli if the module is compiled into the nginx image.
    # (alpine image doesn't ship brotli by default; uncomment if upgrading.)
    # brotli on;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;
}
