name: Visual baseline refresh

# Manually triggered. Runs the Playwright visual-regression spec with
# `--update-snapshots` so baselines are regenerated against the current
# UI state, then opens a PR with the updated snapshot binaries.
#
# Use this after intentional UI changes (theme tweaks, layout shifts,
# new components) that legitimately move pixels. Don't merge the PR
# without eyeballing the diff against the previous baselines — that's
# the whole point of having a regression spec.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to base the snapshot refresh on'
        required: false
        default: 'main'

jobs:
  refresh-baselines:
    name: Refresh visual baselines
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npm run e2e:install

      - name: Update visual baselines
        # Run only the visual-regression spec with --update-snapshots so
        # we don't regenerate other E2E suites' artefacts.
        run: npx playwright test e2e/v2-pages.visual.spec.ts --update-snapshots
        continue-on-error: true

      - name: Open baseline-refresh PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: |
            chore(visual): refresh baselines from ${{ inputs.branch }}

            Generated by the visual-baseline workflow against Ubuntu CI
            so committed baselines match the runtime that runs the
            regression spec on every PR.
          branch: visual-baselines/${{ github.run_id }}
          title: 'chore(visual): refresh baselines from ${{ inputs.branch }}'
          body: |
            Automated baseline refresh from the `visual-baseline` workflow.

            **Review checklist:**
            - [ ] Each diff is an intentional UI change (theme, layout, new component)
            - [ ] No unrelated content changes leaked into the PR
            - [ ] Spot-check 2-3 baselines visually against the live app

            Trigger: ${{ github.actor }} on `${{ inputs.branch }}`.
          add-paths: |
            e2e/__screenshots__/**
