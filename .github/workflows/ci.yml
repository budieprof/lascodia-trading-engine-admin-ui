name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Unit tests (Vitest)
        run: npm test

      - name: Component tests (Vitest + Angular TestBed)
        run: npm run test:components

      - name: Lint
        # Allow-fail until the existing codebase is cleaned up — surfaces drift
        # without blocking merges on pre-existing findings.
        run: npm run lint
        continue-on-error: true

      - name: Production build
        run: npm run build -- --configuration production

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: lascodia-admin-dist
          path: dist/lascodia-admin/browser/
          retention-days: 7

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npm run e2e:install

      - name: Run smoke tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: lascodia-admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
